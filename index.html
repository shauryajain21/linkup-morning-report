<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morning Report — EdTech India</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{
            --cream:#FAF9F6;--paper:#FFFFFF;--ink:#1C1917;--ink2:#44403C;--ink3:#78716C;--ink4:#A8A29E;
            --rule:#E7E5E4;--rule2:#D6D3D1;
            --blue:#0052CC;--blue-soft:#EFF6FF;--blue-mid:#DBEAFE;
            --terra:#C2410C;--terra-soft:#FFF7ED;
            --sage:#15803D;--sage-soft:#F0FDF4;
            --gold:#A16207;--gold-soft:#FEFCE8;
            --violet:#7C3AED;--violet-soft:#F5F3FF;
            --r:6px;--r2:10px;--r3:14px;
            --serif:'Newsreader',Georgia,'Times New Roman',serif;
            --sans:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
            --mono:'JetBrains Mono','SF Mono',monospace;
            --shadow-card:0 1px 3px rgba(28,25,23,.06),0 1px 2px rgba(28,25,23,.04);
            --shadow-lift:0 4px 12px rgba(28,25,23,.08),0 1px 3px rgba(28,25,23,.06);
        }
        html{scroll-behavior:smooth}
        body{font-family:var(--sans);background:var(--cream);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}

        /* ═══ TOPBAR ═══ */
        .topbar{position:sticky;top:0;z-index:50;background:var(--paper);border-bottom:1px solid var(--rule);backdrop-filter:blur(12px);background:rgba(255,255,255,.92)}
        .topbar-inner{max-width:780px;margin:0 auto;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}
        .topbar-brand{display:flex;align-items:center;gap:10px}
        .topbar-brand svg{height:18px;color:var(--ink)}
        .topbar-sep{width:1px;height:16px;background:var(--rule)}
        .topbar-label{font-family:var(--serif);font-size:15px;font-weight:500;color:var(--ink2);font-style:italic}
        .topbar-right{display:flex;align-items:center;gap:12px}
        .key-wrap{display:flex;align-items:center;gap:6px;padding:4px 4px 4px 12px;border:1px solid var(--rule);border-radius:20px;background:var(--paper);transition:border-color .2s}
        .key-wrap:focus-within{border-color:var(--blue)}
        .key-label{font-family:var(--mono);font-size:9px;color:var(--ink4);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
        .key-input{font-family:var(--mono);font-size:11px;border:none;outline:none;background:transparent;color:var(--ink);width:140px;padding:4px 0}
        .key-dot{width:7px;height:7px;border-radius:50%;background:var(--rule2);flex-shrink:0;transition:background .3s}
        .key-dot.ok{background:#22C55E}

        /* ═══ MASTHEAD ═══ */
        .masthead{max-width:780px;margin:0 auto;padding:48px 24px 0;text-align:center}
        .mast-date{font-family:var(--mono);font-size:11px;color:var(--ink4);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
        .mast-title{font-family:var(--serif);font-size:clamp(36px,5vw,52px);font-weight:700;letter-spacing:-.02em;color:var(--ink);line-height:1.1;margin-bottom:10px}
        .mast-sub{font-size:16px;color:var(--ink3);max-width:480px;margin:0 auto 28px;line-height:1.6}
        .mast-rule{height:1px;background:var(--ink);opacity:.12;margin:0 auto;max-width:120px}

        /* ═══ CONFIG DRAWER ═══ */
        .config{max-width:780px;margin:0 auto;padding:28px 24px 0}
        .config-toggle{display:flex;align-items:center;justify-content:center;gap:6px;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;background:none;border:none;padding:8px 16px;border-radius:20px;margin:0 auto;transition:all .15s}
        .config-toggle:hover{color:var(--ink);background:var(--paper)}
        .config-toggle .arrow{transition:transform .2s;font-size:10px}
        .config-toggle.open .arrow{transform:rotate(180deg)}
        .config-body{max-height:0;overflow:hidden;transition:max-height .35s ease,opacity .25s ease;opacity:0}
        .config-body.open{max-height:600px;opacity:1}
        .config-inner{padding:20px 0 8px}

        /* Depth pills */
        .depth-section{margin-bottom:20px}
        .cfg-label{font-family:var(--mono);font-size:10px;color:var(--ink4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
        .depth-pills{display:flex;gap:6px}
        .d-pill{flex:1;padding:12px 14px;border:1.5px solid var(--rule);border-radius:var(--r2);cursor:pointer;transition:all .15s;background:var(--paper);text-align:center}
        .d-pill:hover{border-color:var(--rule2);box-shadow:var(--shadow-card)}
        .d-pill.on{border-color:var(--blue);background:var(--blue-soft)}
        .d-pill .d-name{font-size:14px;font-weight:600;margin-bottom:1px}
        .d-pill.on .d-name{color:var(--blue)}
        .d-pill .d-meta{font-family:var(--mono);font-size:10px;color:var(--ink4)}
        .d-pill.on .d-meta{color:var(--blue)}

        /* Query chips */
        .query-section{margin-bottom:16px}
        .q-chips{display:flex;flex-wrap:wrap;gap:6px}
        .q-tag{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border:1px solid var(--rule);border-radius:20px;font-size:13px;font-weight:500;background:var(--paper);transition:all .12s;cursor:default;white-space:nowrap}
        .q-tag:hover{border-color:var(--rule2)}
        .q-tag.running{border-color:var(--blue);background:var(--blue-soft);color:var(--blue)}
        .q-tag.done{border-color:#BBF7D0;background:var(--sage-soft);color:var(--sage)}
        .q-tag.error{border-color:#FECACA;background:#FEF2F2;color:var(--terra)}
        .q-tag .q-x{font-size:14px;color:var(--ink4);cursor:pointer;margin-left:2px;line-height:1;transition:color .1s}
        .q-tag .q-x:hover{color:var(--terra)}
        .q-tag .ico{font-size:14px}
        .q-add-row{display:flex;gap:6px;margin-top:8px}
        .q-add-input{flex:1;font-family:var(--sans);font-size:13px;padding:7px 14px;border:1px solid var(--rule);border-radius:20px;outline:none;background:var(--paper);color:var(--ink);transition:border-color .15s}
        .q-add-input:focus{border-color:var(--blue)}
        .q-add-input::placeholder{color:var(--ink4)}
        .q-add-btn{font-family:var(--mono);font-size:11px;padding:7px 16px;border:1px solid var(--rule);border-radius:20px;background:var(--paper);color:var(--ink3);cursor:pointer;transition:all .12s;white-space:nowrap}
        .q-add-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-soft)}

        /* Generate button */
        .gen-wrap{text-align:center;padding:8px 0 0}
        .gen-btn{font-family:var(--sans);font-size:15px;font-weight:600;padding:14px 40px;background:var(--ink);color:var(--cream);border:none;border-radius:28px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:10px;letter-spacing:-.01em}
        .gen-btn:hover{background:#292524;transform:translateY(-1px);box-shadow:var(--shadow-lift)}
        .gen-btn:active{transform:translateY(0)}
        .gen-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
        .gen-btn .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* ═══ LOADING STATE ═══ */
        .loading-wrap{max-width:780px;margin:0 auto;padding:60px 24px;text-align:center;display:none}
        .loading-wrap.vis{display:block;animation:fadeIn .3s ease}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .load-orb{width:80px;height:80px;margin:0 auto 24px;position:relative}
        .load-orb .r1,.load-orb .r2,.load-orb .r3{position:absolute;inset:0;border:1.5px solid transparent;border-radius:50%}
        .load-orb .r1{border-top-color:var(--blue);animation:orbit 1.2s linear infinite}
        .load-orb .r2{inset:10px;border-top-color:var(--terra);animation:orbit 1.8s linear infinite reverse}
        .load-orb .r3{inset:20px;border-top-color:var(--gold);animation:orbit 2.4s linear infinite}
        .load-orb .core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;background:var(--blue);border-radius:50%;animation:pulse-c 1.2s ease infinite}
        @keyframes orbit{to{transform:rotate(360deg)}}
        @keyframes pulse-c{0%,100%{opacity:.3;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.8)}}
        .load-label{font-family:var(--serif);font-size:18px;font-weight:500;color:var(--ink2);margin-bottom:4px}
        .load-timer{font-family:var(--mono);font-size:24px;font-weight:500;color:var(--ink);letter-spacing:-.5px;margin-bottom:6px}
        .load-query{font-size:13px;color:var(--ink4);max-width:360px;margin:0 auto}
        .load-progress{max-width:200px;margin:20px auto 0;height:2px;background:var(--rule);border-radius:1px;overflow:hidden}
        .load-progress-bar{height:100%;background:var(--blue);border-radius:1px;transition:width .4s ease;width:0}

        /* ═══ REPORT ═══ */
        .report{max-width:780px;margin:0 auto;padding:0 24px 80px;display:none}
        .report.vis{display:block}

        /* Report header */
        .rpt-header{padding:40px 0 32px;text-align:center;position:relative}
        .rpt-header::after{content:'';display:block;width:60px;height:1px;background:var(--ink);opacity:.15;margin:28px auto 0}
        .rpt-eyebrow{font-family:var(--mono);font-size:10px;color:var(--blue);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:6px}
        .rpt-eyebrow .live-dot{width:6px;height:6px;background:var(--blue);border-radius:50%;animation:pulse-c 2s ease infinite}
        .rpt-h1{font-family:var(--serif);font-size:clamp(30px,4vw,42px);font-weight:700;letter-spacing:-.02em;line-height:1.15;margin-bottom:8px}
        .rpt-daterow{font-family:var(--mono);font-size:11px;color:var(--ink4);letter-spacing:.3px}
        .rpt-stats{display:flex;justify-content:center;gap:20px;margin-top:16px}
        .rpt-stat{font-family:var(--mono);font-size:11px;color:var(--ink3)}
        .rpt-stat b{font-weight:600;color:var(--ink)}

        /* Section */
        .rpt-section{margin-bottom:32px;animation:sec-in .4s ease both}
        @keyframes sec-in{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .rpt-section:nth-child(2){animation-delay:.05s}
        .rpt-section:nth-child(3){animation-delay:.1s}
        .rpt-section:nth-child(4){animation-delay:.15s}
        .rpt-section:nth-child(5){animation-delay:.2s}

        .sec-card{background:var(--paper);border:1px solid var(--rule);border-radius:var(--r3);overflow:hidden;box-shadow:var(--shadow-card);transition:box-shadow .2s}
        .sec-card:hover{box-shadow:var(--shadow-lift)}

        .sec-accent{height:3px}
        .sec-accent.a1{background:linear-gradient(90deg,var(--blue),#60A5FA)}
        .sec-accent.a2{background:linear-gradient(90deg,var(--violet),#A78BFA)}
        .sec-accent.a3{background:linear-gradient(90deg,var(--sage),#4ADE80)}
        .sec-accent.a4{background:linear-gradient(90deg,var(--gold),#FACC15)}
        .sec-accent.a5{background:linear-gradient(90deg,var(--terra),#FB923C)}

        .sec-body{padding:24px 28px}
        .sec-top{display:flex;align-items:center;gap:10px;margin-bottom:16px}
        .sec-icon{font-size:20px}
        .sec-title{font-family:var(--serif);font-size:20px;font-weight:600;letter-spacing:-.01em;flex:1}
        .sec-count{font-family:var(--mono);font-size:10px;color:var(--ink4);background:var(--cream);padding:3px 10px;border-radius:10px}

        /* Insights */
        .insight{padding:14px 0;border-bottom:1px solid var(--rule)}
        .insight:last-child{border-bottom:none;padding-bottom:0}
        .insight:first-child{padding-top:0}
        .insight-text{font-size:15px;line-height:1.7;color:var(--ink2)}
        .insight-text strong{color:var(--ink);font-weight:600}
        .insight-src{margin-top:6px;font-family:var(--mono);font-size:10px;color:var(--ink4);display:flex;align-items:center;gap:5px;transition:color .15s}
        .insight-src a{color:var(--ink4);text-decoration:none;transition:color .15s}
        .insight-src a:hover{color:var(--blue)}
        .insight-src .src-ico{opacity:.5}

        /* Synthesis card */
        .synth-card{background:var(--paper);border:1px solid var(--rule);border-radius:var(--r3);overflow:hidden;box-shadow:var(--shadow-card);margin-bottom:32px}
        .synth-accent{height:3px;background:linear-gradient(90deg,var(--gold),var(--terra),var(--violet),var(--blue));background-size:200% 100%;animation:synth-grad 6s linear infinite}
        @keyframes synth-grad{to{background-position:-200% 0}}
        .synth-body{padding:28px 28px}
        .synth-label{font-family:var(--mono);font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
        .synth-label .s-ico{font-size:14px}
        .synth-text{font-family:var(--serif);font-size:18px;font-weight:400;line-height:1.75;color:var(--ink);font-style:italic}

        /* Sources panel */
        .sources-panel{margin-bottom:32px}
        .sources-label{font-family:var(--mono);font-size:10px;color:var(--ink4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
        .sources-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
        .src-chip{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--paper);border:1px solid var(--rule);border-radius:var(--r2);transition:all .12s;font-size:12px}
        .src-chip:hover{border-color:var(--rule2);box-shadow:var(--shadow-card)}
        .src-num{font-family:var(--mono);font-size:9px;color:var(--ink4);min-width:14px}
        .src-info{flex:1;min-width:0}
        .src-name{font-weight:500;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;font-size:12px}
        .src-domain{font-family:var(--mono);font-size:9px;color:var(--ink4);margin-top:1px}
        .src-chip a{text-decoration:none;display:block}
        .src-chip a:hover .src-name{color:var(--blue)}

        /* Report footer */
        .rpt-footer{text-align:center;padding:16px 0 0;border-top:1px solid var(--rule)}
        .rpt-footer-inner{display:flex;align-items:center;justify-content:center;gap:16px}
        .rpt-footer-link{font-family:var(--mono);font-size:10px;color:var(--ink4);text-decoration:none;padding:6px 12px;border:1px solid var(--rule);border-radius:16px;transition:all .12s;cursor:pointer;background:none}
        .rpt-footer-link:hover{border-color:var(--rule2);color:var(--ink3)}
        .rpt-powered{font-family:var(--mono);font-size:10px;color:var(--ink4);display:flex;align-items:center;gap:6px}
        .rpt-powered svg{height:12px;color:var(--ink4)}

        /* No data */
        .no-data{font-family:var(--serif);font-size:14px;color:var(--ink4);font-style:italic;padding:8px 0}

        /* Error */
        .sec-error{padding:12px 16px;background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--r);font-size:13px;color:var(--terra)}
        .sec-error b{display:block;font-weight:600;margin-bottom:2px}

        /* Toast */
        .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);font-family:var(--sans);font-size:13px;font-weight:500;padding:10px 24px;border-radius:24px;background:var(--ink);color:var(--cream);box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:200;opacity:0;transition:all .3s ease;white-space:nowrap}
        .toast.vis{transform:translateX(-50%) translateY(0);opacity:1}

        /* ═══ RESPONSIVE ═══ */
        @media(max-width:640px){
            .masthead{padding:32px 16px 0}
            .config,.report{padding-left:16px;padding-right:16px}
            .depth-pills{flex-direction:column}
            .sec-body{padding:18px 20px}
            .synth-body{padding:20px}
            .topbar-inner{padding:0 16px}
            .key-input{width:100px}
            .sources-grid{grid-template-columns:1fr}
            .rpt-stats{gap:12px;flex-wrap:wrap}
        }
        @media print{
            .topbar,.config,.loading-wrap,.gen-wrap{display:none!important}
            .report{padding-top:0}
            body{background:#fff}
        }
    </style>
</head>

                <path d="M443.195 127.385V48.047H452.062V57.373H453.675C455.131 54.533 457.49 52 460.756 49.774C464.017 47.548 468.566 46.435 474.401 46.435C479.238 46.435 483.672 47.603 487.703 49.948C491.734 52.289 494.958 55.609 497.372 59.905C499.791 64.206 501 69.386 501 75.451V76.948C501 82.935 499.809 88.115 497.427 92.493C495.045 96.867 491.844 100.206 487.813 102.51C483.782 104.814 479.312 105.964 474.397 105.964C470.48 105.964 467.16 105.446 464.434 104.411C461.709 103.376 459.501 102.052 457.811 100.44C456.121 98.828 454.815 97.179 453.895 95.489H452.282V127.385H443.186H443.195ZM471.983 97.907C477.814 97.907 482.559 96.048 486.205 92.324C489.851 88.605 491.674 83.402 491.674 76.724V75.689C491.674 69.011 489.851 63.812 486.205 60.089C482.559 56.365 477.818 54.505 471.983 54.505C466.147 54.505 461.484 56.37 457.76 60.089C454.037 63.812 452.177 69.011 452.177 75.689V76.724C452.177 83.402 454.037 88.605 457.76 92.324C461.484 96.048 466.225 97.907 471.983 97.907Z" fill="currentColor"/>
                <path d="M221.922 34.261C221.922 37.329 219.435 39.812 216.371 39.812C213.307 39.812 210.819 37.325 210.819 34.261C210.819 31.197 213.307 28.71 216.371 28.71C219.435 28.71 221.922 31.197 221.922 34.261Z" fill="currentColor"/>
            </svg>
            <div class="topbar-sep"></div>
            <span class="topbar-label">Morning Report</span>
        </div>
        <div class="topbar-right">
            <div class="key-wrap">
                <span class="key-label">Key</span>
                <input type="password" class="key-input" id="keyInput" placeholder="lk-..." autocomplete="off" spellcheck="false">
                <span class="key-dot" id="keyDot"></span>
            </div>
        </div>
    </div>
</header>

<!-- MASTHEAD -->
<div class="masthead">
    <div class="mast-date" id="mastDate"></div>
    <h1 class="mast-title">Your EdTech<br>Morning Briefing</h1>
    <p class="mast-sub">Real-time intelligence on Indian EdTech &mdash; funding rounds, student trends, policy shifts, and AI breakthroughs. Powered by Linkup deep search.</p>
    <div class="mast-rule"></div>
</div>

<!-- CONFIG -->
<div class="config">
    <button class="config-toggle" id="cfgToggle" onclick="toggleConfig()">
        Configure report <span class="arrow">&#9662;</span>
    </button>
    <div class="config-body" id="cfgBody">
        <div class="config-inner">
            <!-- Depth -->
            <div class="depth-section">
                <div class="cfg-label">Search Depth</div>
                <div class="depth-pills">
                    <div class="d-pill" data-v="fast" onclick="setDepth('fast')">
                        <div class="d-name">Fast</div>
                        <div class="d-meta">&lt;1s &middot; $0.001</div>
                    </div>
                    <div class="d-pill on" data-v="standard" onclick="setDepth('standard')">
                        <div class="d-name">Standard</div>
                        <div class="d-meta">1-3s &middot; $0.005</div>
                    </div>
                    <div class="d-pill" data-v="deep" onclick="setDepth('deep')">
                        <div class="d-name">Deep</div>
                        <div class="d-meta">5-30s &middot; $0.05</div>
                    </div>
                </div>
            </div>
            <!-- Queries -->
            <div class="query-section">
                <div class="cfg-label">Topics</div>
                <div class="q-chips" id="qChips"></div>
                <div class="q-add-row">
                    <input type="text" class="q-add-input" id="addInput" placeholder="Add a custom topic...">
                    <button class="q-add-btn" onclick="addQuery()">+ Add</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Generate -->
    <div class="gen-wrap">
        <button class="gen-btn" id="genBtn" onclick="generate()">
            Generate Briefing
        </button>
    </div>
</div>

<!-- LOADING -->
<div class="loading-wrap" id="loadWrap">
    <div class="load-orb">
        <div class="r1"></div>
        <div class="r2"></div>
        <div class="r3"></div>
        <div class="core"></div>
    </div>
    <div class="load-label">Researching</div>
    <div class="load-timer" id="loadTimer">0.0s</div>
    <div class="load-query" id="loadQuery"></div>
    <div class="load-progress"><div class="load-progress-bar" id="loadBar"></div></div>
</div>

<!-- REPORT -->
<div class="report" id="report"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
const API = 'https://api.linkup.so/v1/search';
let depth = 'standard';
const qIcons = ['\u{1F4B0}','\u{1F393}','\u{1F3DB}','\u{1F916}','\u{1F50D}','\u{1F4CA}','\u{1F30D}','\u{2B50}'];
const accents = ['a1','a2','a3','a4','a5'];

let queries = [
    { label:'EdTech Funding', query:'India EdTech startup funding news this week 2026' },
    { label:'Student Trends', query:'India student learning behavior trends 2026' },
    { label:'Policy & NEP', query:'India education policy NEP regulation updates 2026' },
    { label:'AI in Education', query:'AI tutoring personalized learning India EdTech 2026' },
];

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
const kI = document.getElementById('keyInput');
const kD = document.getElementById('keyDot');
const sk = localStorage.getItem('linkup_api_key');
if(sk){ kI.value = sk; kD.classList.add('ok'); }
kI.addEventListener('input',()=>{
    const k = kI.value.trim();
    if(k){ localStorage.setItem('linkup_api_key',k); kD.classList.add('ok'); }
    else{ localStorage.removeItem('linkup_api_key'); kD.classList.remove('ok'); }
});

const now = new Date();
document.getElementById('mastDate').textContent = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

function setDepth(v){ depth=v; document.querySelectorAll('.d-pill').forEach(p=>p.classList.toggle('on',p.dataset.v===v)); }

function renderChips(){
    const wrap = document.getElementById('qChips');
    wrap.innerHTML = queries.map((q,i) => `
        <span class="q-tag" id="qt-${i}">
            <span class="ico">${qIcons[i%qIcons.length]}</span>
            ${esc(q.label)}
            <span class="q-x" onclick="removeQuery(${i})">&times;</span>
        </span>
    `).join('');
}
renderChips();

function addQuery(){
    const inp = document.getElementById('addInput');
    const v = inp.value.trim();
    if(!v) return;
    queries.push({ label: v.length>28 ? v.slice(0,25)+'...' : v, query: v });
    inp.value = '';
    renderChips();
    toast('\u2713 Topic added');
}
document.getElementById('addInput').addEventListener('keydown',e=>{ if(e.key==='Enter') addQuery(); });
function removeQuery(i){ queries.splice(i,1); renderChips(); }

function toggleConfig(){
    const body = document.getElementById('cfgBody');
    const toggle = document.getElementById('cfgToggle');
    body.classList.toggle('open');
    toggle.classList.toggle('open');
}

// ═══════════════════════════════════════
// GENERATE
// ═══════════════════════════════════════
let loadInterval = null;

async function generate(){
    const apiKey = kI.value.trim();
    if(!apiKey){ toast('Enter your API key first'); kI.focus(); return; }
    if(!queries.length){ toast('Add at least one topic'); return; }

    const btn = document.getElementById('genBtn');
    const loadWrap = document.getElementById('loadWrap');
    const loadBar = document.getElementById('loadBar');
    const rpt = document.getElementById('report');

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Generating...';
    rpt.classList.remove('vis');
    rpt.innerHTML = '';
    loadWrap.classList.add('vis');
    loadBar.style.width = '0%';

    // Hide masthead config once generating
    document.querySelector('.masthead').style.display = 'none';
    document.querySelector('.config').style.display = 'none';

    // Reset chips
    queries.forEach((_,i)=>{
        const el = document.getElementById('qt-'+i);
        if(el) el.className = 'q-tag';
    });

    const t0 = Date.now();
    if(loadInterval) clearInterval(loadInterval);
    const timerEl = document.getElementById('loadTimer');
    loadInterval = setInterval(()=>{ timerEl.textContent = ((Date.now()-t0)/1000).toFixed(1)+'s'; },100);

    const results = [];
    let totalSrc = 0;

    for(let i=0; i<queries.length; i++){
        const q = queries[i];
        document.getElementById('loadQuery').textContent = q.label;
        loadBar.style.width = (i/queries.length*100)+'%';

        const chip = document.getElementById('qt-'+i);
        if(chip) chip.classList.add('running');

        try{
            const data = await fetchAPI(q.query, apiKey);
            results.push(data);
            const sc = (data.sources||[]).length;
            totalSrc += sc;
            if(chip){ chip.classList.remove('running'); chip.classList.add('done'); }
        }catch(err){
            results.push({error:err.message});
            if(chip){ chip.classList.remove('running'); chip.classList.add('error'); }
        }
        loadBar.style.width = ((i+1)/queries.length*100)+'%';
    }

    clearInterval(loadInterval); loadInterval = null;
    const elapsed = ((Date.now()-t0)/1000).toFixed(1);

    loadWrap.classList.remove('vis');
    buildReport(results, elapsed, totalSrc);

    btn.disabled = false;
    btn.innerHTML = 'Generate Briefing';
    toast(totalSrc+' sources found in '+elapsed+'s');
}

async function fetchAPI(query, apiKey){
    const r = await fetch(API,{
        method:'POST',
        headers:{'Authorization':'Bearer '+apiKey,'Content-Type':'application/json'},
        body:JSON.stringify({q:query, depth, outputType:'sourcedAnswer'})
    });
    if(!r.ok){
        const e = await r.json().catch(()=>({}));
        throw new Error(e.message||(e.error&&e.error.message)||(typeof e.error==='string'?e.error:null)||e.detail||'HTTP '+r.status);
    }
    return r.json();
}

// ═══════════════════════════════════════
// BUILD REPORT
// ═══════════════════════════════════════
function buildReport(results, elapsed, totalSrc){
    const rpt = document.getElementById('report');
    const dateStr = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    const timeStr = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    let h = '';

    // Header
    h += `<div class="rpt-header">
        <div class="rpt-eyebrow"><span class="live-dot"></span> Live Report</div>
        <h2 class="rpt-h1">EdTech Morning Briefing</h2>
        <div class="rpt-daterow">${esc(dateStr)} &middot; ${esc(timeStr)}</div>
        <div class="rpt-stats">
            <span class="rpt-stat"><b>${queries.length}</b> topics</span>
            <span class="rpt-stat"><b>${totalSrc}</b> sources</span>
            <span class="rpt-stat"><b>${elapsed}s</b> elapsed</span>
            <span class="rpt-stat"><b>${depth}</b> depth</span>
        </div>
    </div>`;

    // Sections
    const allSources = [];
    queries.forEach((q,i)=>{
        const data = results[i];
        const accent = accents[i%accents.length];
        const icon = qIcons[i%qIcons.length];

        h += `<div class="rpt-section"><div class="sec-card">
            <div class="sec-accent ${accent}"></div>
            <div class="sec-body">
                <div class="sec-top">
                    <span class="sec-icon">${icon}</span>
                    <span class="sec-title">${esc(q.label)}</span>`;
        if(data && !data.error){
            const sc = (data.sources||[]).length;
            h += `<span class="sec-count">${sc} source${sc!==1?'s':''}</span>`;
        }
        h += `</div>`;

        if(data && data.error){
            h += `<div class="sec-error"><b>Error</b>${esc(data.error)}</div>`;
        } else if(data){
            const bullets = extractBullets(data);
            if(bullets.length){
                bullets.forEach(b=>{
                    h += `<div class="insight">
                        <div class="insight-text">${mdInline(b.text)}</div>
                        ${b.url ? `<div class="insight-src"><span class="src-ico">\u{1F517}</span> <a href="${esc(b.url)}" target="_blank" rel="noopener">${esc(truncUrl(b.url))}</a></div>` : ''}
                    </div>`;
                });
            } else {
                h += `<div class="no-data">No insights found for this topic.</div>`;
            }
            (data.sources||[]).forEach(s=>{
                if(s&&s.url&&!allSources.find(x=>x.url===s.url)) allSources.push(s);
            });
        } else {
            h += `<div class="no-data">No data retrieved.</div>`;
        }
        h += `</div></div></div>`;
    });

    // Synthesis
    const synth = buildSynthesis(results);
    h += `<div class="rpt-section"><div class="synth-card">
        <div class="synth-accent"></div>
        <div class="synth-body">
            <div class="synth-label"><span class="s-ico">\u{1F4A1}</span> The Takeaway</div>
            <div class="synth-text">${synth ? mdInline(synth) : '<span style="color:var(--ink4)">Not enough data to synthesize a takeaway.</span>'}</div>
        </div>
    </div></div>`;

    // Sources
    if(allSources.length){
        h += `<div class="sources-panel">
            <div class="sources-label">All Sources (${allSources.length})</div>
            <div class="sources-grid">`;
        allSources.slice(0,12).forEach((s,i)=>{
            let dom=''; try{dom=new URL(s.url).hostname.replace('www.','');}catch(e){dom=s.url;}
            const nm = s.name||s.title||dom;
            h += `<div class="src-chip"><span class="src-num">${i+1}</span><div class="src-info"><a href="${esc(s.url)}" target="_blank" rel="noopener"><span class="src-name">${esc(nm)}</span><span class="src-domain">${esc(dom)}</span></a></div></div>`;
        });
        h += `</div></div>`;
    }

    // Footer
    h += `<div class="rpt-footer"><div class="rpt-footer-inner">
        <button class="rpt-footer-link" onclick="copyReport()">Copy as text</button>
        <button class="rpt-footer-link" onclick="window.print()">Print</button>
        <button class="rpt-footer-link" onclick="newReport()">New report</button>
        <span class="rpt-powered">
            <svg viewBox="0 0 501 128" fill="none"><path d="M150.677 72.711C146.612 70.249 137.909 69.542 124.794 70.608C128.992 57.678 133.757 35.391 121.323 25.153C115.886 20.674 107.471 19.044 97.616 20.559C94.676 21.014 91.575 21.745 88.388 22.732C78.867 8.282 66.295 0 53.861 0C39.429 0 26.13 9.338 16.408 26.287C5.675 45.014 0 71.963 0 104.23V104.533L3.604 106.94L3.883 106.825C30.575 95.563 67.576 85.072 100.593 79.404C101.604 87.644 102.116 95.995 102.116 104.235V104.52L105.491 107L105.761 106.913C106.255 106.752 155.159 90.882 153.979 77.589C153.856 76.202 153.183 74.227 150.677 72.711Z" fill="currentColor"/><path d="M192.855 23.754H183.758V104.356H192.855V23.754Z" fill="currentColor"/><path d="M221.066 48.047H211.969V104.351H221.066V48.047Z" fill="currentColor"/><path d="M240.18 104.356V48.052H249.048V57.611H250.66C251.888 54.922 253.981 52.485 256.935 50.296C259.89 48.107 264.246 47.012 270.008 47.012C274.227 47.012 278.01 47.896 281.349 49.659C284.688 51.427 287.354 54.033 289.351 57.491C291.348 60.945 292.347 65.204 292.347 70.27V104.356H283.25V70.962C283.25 65.36 281.848 61.288 279.045 58.756C276.242 56.223 272.463 54.959 267.704 54.959C262.253 54.959 257.819 56.727 254.402 60.253C250.985 63.785 249.277 69.043 249.277 76.027V104.351H240.18V104.356Z" fill="currentColor"/><path d="M310.769 104.356V23.754H319.866V71.191H321.478L347.271 48.047H359.936L328.734 75.455L360.861 104.356H348.311L321.478 79.829H319.866V104.356H310.769Z" fill="currentColor"/></svg>
            linkup.so
        </span>
    </div></div>`;

    rpt.innerHTML = h;
    rpt.classList.add('vis');
    window.scrollTo({top:0,behavior:'smooth'});
}

function newReport(){
    document.querySelector('.masthead').style.display = '';
    document.querySelector('.config').style.display = '';
    document.getElementById('report').classList.remove('vis');
    document.getElementById('report').innerHTML = '';
    window.scrollTo({top:0,behavior:'smooth'});
}

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function extractBullets(data, max=5){
    if(!data) return [];
    const answer = data.answer||'';
    const sources = data.sources||[];
    if(!answer) return [];
    const sentences = answer.replace(/\n/g,' ').split(/(?<=[.!?])\s+/).filter(s=>s.trim().length>20);
    return sentences.slice(0,max).map((s,i)=>{
        s=s.trim(); if(!/[.!?]$/.test(s)) s+='.';
        return { text:s, url: i<sources.length ? sources[i].url : '' };
    });
}

function buildSynthesis(results){
    const answers = results.filter(r=>r&&!r.error&&r.answer).map(r=>r.answer);
    if(answers.length<2) return '';
    function first(t){ for(const s of t.replace(/\n/g,' ').split(/(?<=[.!?])\s+/)){ const x=s.trim(); if(x.length>40) return x+(/[.!?]$/.test(x)?'':'.'); } return t.slice(0,200).trim(); }
    const parts = answers.slice(0,3).map(a=>first(a));
    let s = parts[0]+' ';
    if(parts[1]) s += 'At the same time, '+parts[1][0].toLowerCase()+parts[1].slice(1)+' ';
    if(parts[2]) s += 'Meanwhile, '+parts[2][0].toLowerCase()+parts[2].slice(1)+' ';
    s += 'For founders building in Indian education, this signals a window where capital is flowing toward products that meet learners where they are \u2014 mobile-first, vernacular, and outcome-driven.';
    return s;
}

function mdInline(s){ return (s||'').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>'); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function truncUrl(u){ try{ const p=new URL(u); const path=p.pathname.length>20?p.pathname.slice(0,17)+'...':p.pathname; return p.hostname.replace('www.','')+path; }catch(e){ return u.length>40?u.slice(0,37)+'...':u; }}

function copyReport(){
    let t = 'EDTECH MORNING BRIEFING\n'+now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})+'\n'+'='.repeat(40)+'\n\n';
    document.querySelectorAll('.insight-text').forEach(el=>{ t += '\u2022 '+el.textContent.trim()+'\n\n'; });
    const synth = document.querySelector('.synth-text');
    if(synth) t += 'THE TAKEAWAY\n'+synth.textContent.trim()+'\n\n';
    t += '---\nPowered by Linkup \u2014 linkup.so\n';
    navigator.clipboard.writeText(t).then(()=>toast('Copied to clipboard'));
}

let toastTm;
function toast(msg){
    const el=document.getElementById('toast');
    el.textContent=msg;
    el.classList.add('vis');
    clearTimeout(toastTm);
    toastTm=setTimeout(()=>el.classList.remove('vis'),2800);
}
</script>
